<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fun Fact Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      padding: 40px 32px 36px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .icon {
      font-size: 2.6rem;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 28px;
    }

    .topic-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .topic-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1.5px solid #e5e7eb;
      background: #f9fafb;
      color: #374151;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
    }
    .topic-btn:hover { border-color: #a78bfa; background: #f5f3ff; color: #6d28d9; }
    .topic-btn.active {
      background: #6d28d9;
      border-color: #6d28d9;
      color: #fff;
    }

    .fact-box {
      min-height: 110px;
      background: #f8f7ff;
      border: 1.5px solid #ede9fe;
      border-radius: 14px;
      padding: 20px 22px;
      font-size: 1.05rem;
      line-height: 1.65;
      color: #2d2d3a;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.3s;
      text-align: left;
    }

    .fact-box.loading {
      color: #9ca3af;
      font-style: italic;
      text-align: center;
    }

    .fact-box.error {
      background: #fff5f5;
      border-color: #fecaca;
      color: #dc2626;
      font-size: 0.9rem;
      text-align: center;
    }

    .quote-icon {
      position: absolute;
      top: 12px;
      left: 14px;
      font-size: 1.4rem;
      color: #c4b5fd;
      line-height: 1;
    }

    .fact-text {
      padding-left: 8px;
    }

    .generate-btn {
      width: 100%;
      padding: 13px 24px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      font-family: inherit;
      letter-spacing: 0.01em;
    }
    .generate-btn:hover { opacity: 0.9; }
    .generate-btn:active { transform: scale(0.98); }
    .generate-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .footer {
      margin-top: 20px;
      font-size: 0.75rem;
      color: #c4b5fd;
    }

    .dots span {
      display: inline-block;
      animation: bounce 1.2s infinite;
      margin: 0 1px;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌍</div>
    <h1>Fun Fact Generator</h1>
    <p class="subtitle">AI-powered facts on any topic</p>

    <div class="topic-row" id="topics">
      <button class="topic-btn active" data-topic="Planet Earth">🌍 Earth</button>
      <button class="topic-btn" data-topic="Cats">🐱 Cats</button>
      <button class="topic-btn" data-topic="Space">🚀 Space</button>
      <button class="topic-btn" data-topic="History">📜 History</button>
      <button class="topic-btn" data-topic="Science">🔬 Science</button>
      <button class="topic-btn" data-topic="Ocean">🌊 Ocean</button>
    </div>

    <div id="fact-box" class="fact-box">
      <span class="quote-icon">"</span>
      <span class="fact-text">Click the button to get a fascinating AI-generated fact!</span>
    </div>

    <button id="generate-btn" class="generate-btn">✨ Generate a Fun Fact</button>

    <p class="footer">Powered by Claude AI</p>
  </div>

  <script>
    let selectedTopic = 'Planet Earth';

    document.getElementById('topics').addEventListener('click', (e) => {
      const btn = e.target.closest('.topic-btn');
      if (!btn) return;
      document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedTopic = btn.dataset.topic;
    });

    document.getElementById('generate-btn').addEventListener('click', generateFact);

    async function generateFact() {
      const factBox = document.getElementById('fact-box');
      const btn = document.getElementById('generate-btn');

      factBox.className = 'fact-box loading';
      factBox.innerHTML = `Thinking<span class="dots"><span>.</span><span>.</span><span>.</span></span>`;
      btn.disabled = true;

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{
              role: 'user',
              content: `Give me ONE surprising, specific, and fascinating fun fact about "${selectedTopic}". 
              Keep it to 1-2 sentences. Make it something most people wouldn't know. 
              Respond with ONLY the fact — no intro, no label, no quotation marks, no extra commentary.`
            }]
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error?.message || 'API error');
        }

        const fact = data.content?.[0]?.text?.trim();
        if (!fact) throw new Error('No fact returned.');

        factBox.className = 'fact-box';
        factBox.innerHTML = `<span class="quote-icon">"</span><span class="fact-text">${escapeHtml(fact)}</span>`;

      } catch (err) {
        factBox.className = 'fact-box error';
        factBox.textContent = `⚠️ Couldn't load a fact right now. Please try again.`;
        console.error(err);
      } finally {
        btn.disabled = false;
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
